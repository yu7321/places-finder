# -----------------------------------------------------------------------------
# Places Finder configuration template (agriturismo example).
#
# Copy this file to `config.yaml` and fill in your Google Places API key.
# `config.yaml` is gitignored. You can also set the API key via the
# GOOGLE_API_KEY environment variable, which overrides the value here.
#
# How to get a Google Places API key:
#   1. Go to https://console.cloud.google.com/
#   2. Create or select a project.
#   3. Enable the "Places API (New)" under APIs & Services > Library.
#   4. Create an API key under APIs & Services > Credentials.
#   5. Restrict it to the Places API for safety.
#
# This file is the "agriturismo" example. To retarget the pipeline at a
# different category of place, change the `profile`, `search_queries`, and
# `require_keywords` sections. See `examples/` for ready-to-use alternative
# configs (wineries, specialty coffee, etc.).
# -----------------------------------------------------------------------------

google_api_key: "YOUR_GOOGLE_PLACES_API_KEY_HERE"

# -----------------------------------------------------------------------------
# Profile
# -----------------------------------------------------------------------------
# Identifies what category of place this config is tuned for. Used in log
# messages and as the default CSV filename stem.
profile:
  name: "agriturismo"           # short identifier; used in filenames
  label: "agriturismi"          # human-readable plural; used in log messages

# -----------------------------------------------------------------------------
# Search parameters
# -----------------------------------------------------------------------------

# Default search location (overridable via --location).
default_location: "Chianti, Tuscany, Italy"

# Default search radius in km (overridable via --radius).
default_radius_km: 30

# Language code passed to the Places API. Influences the language of review
# text and formatted addresses returned by Google. Use "it" for Italian,
# "de" for German, "en" for English, etc.
language_code: "it"

# Text queries used to find places. Multiple queries help coverage because
# Google Places doesn't always have a clean single category for what you
# want — a mix of phrasings improves recall.
#
# REGIONAL VOCABULARY (the real value of this list):
# Italian farm stays go by many local names depending on the region. If you
# only search for "agriturismo" you'll miss most of the places you actually
# want, because the displayed name is usually the historical building type:
#
#   masseria  → Puglia, Basilicata, Sicily (fortified farmhouse)
#   casale    → Tuscany, Lazio, Marche (rural homestead)
#   podere    → Tuscany (small farm)
#   tenuta    → generic (estate)
#   borgo     → restored hamlet, often converted to lodging
#   baglio    → Sicily (Arabic-origin courtyard farmhouse)
#   trullo    → Itria valley, Puglia (cone-roofed rural building)
#   fattoria  → generic Italian farm
#
# Standalone queries for these terms cast a wider net than tying everything
# to "agriturismo". The require_keywords filter below catches the real farm
# stays among the results.
search_queries:
  # Generic
  - "agriturismo"
  - "agriturismo farm stay"
  - "agriturismo con piscina"
  - "azienda agricola agriturismo"
  - "fattoria didattica"
  - "country house Italy"
  - "bio farm Italia"
  # Regional building types — searched standalone
  - "masseria"
  - "masseria agriturismo"
  - "casale agriturismo"
  - "podere agriturismo"
  - "tenuta agriturismo"
  - "borgo agriturismo"
  - "trullo agriturismo"

# Only keep results whose name or Google-assigned types contain one of these
# tokens (case-insensitive). Filters out generic hotels that happen to match
# a query. Leave empty (or omit) to keep every result without filtering.
#
# Note: Google's official place type for Italian farm stays is "farmstay"
# (one word, no space), so that token is the most reliable signal — many
# real agriturismi don't have the word "agriturismo" in their displayed name.
#
# The regional building types below let masseria/casale/podere/etc.
# properties survive the filter even when Google's type is just "lodging".
# Trade-off: this also lets through luxury hotels in converted farmhouses
# (Masseria San Domenico, Borgo Egnazia, etc.). For a Puglia farm-stay
# trip that's usually a feature, not a bug — but if you want strictly
# working farms, drop the building-type tokens.
require_keywords:
  - "farmstay"
  - "farm stay"
  - "agriturismo"
  - "agritourism"
  - "fattoria"
  - "masseria"
  - "casale"
  - "podere"
  - "tenuta"
  - "borgo"
  - "baglio"
  - "trullo"

# -----------------------------------------------------------------------------
# Output settings
# -----------------------------------------------------------------------------
output:
  csv_path: "agriturismi.csv"   # default stem; filenames are auto-timestamped
  encoding: "utf-8"
  max_reviews_per_place: 5
